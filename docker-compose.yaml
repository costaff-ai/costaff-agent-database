services:
  agent-database:
    build:
      context: ./agent
    container_name: costaff-agent-database
    restart: on-failure
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - PUBLIC_HOST=costaff-agent-database
      - MCP_DATABASE_URL=http://costaff-mcp-database:8082/mcp
      # Plan B workspace env vars (injected by CoStaff CLI at deploy time)
      - WORKSPACE_DIR=/app/data
      - SHARED_DIR=/app/data/shared
      - COSTAFF_SHARED_DIR_DATABASE=/app/data/shared/costaff-agent-database
      - AGENT_WORKSPACE_DIR_DATABASE=/app/data
      - COSTAFF_AGENT_MODEL_PROVIDER=${COSTAFF_AGENT_MODEL_PROVIDER:-gemini}
      - DATABASE_AGENT_MODEL=${DATABASE_AGENT_MODEL:-gemini-2.5-flash}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - LITELLM_MODEL_NAME=${LITELLM_MODEL_NAME:-}
      - LITELLM_API_BASE=${LITELLM_API_BASE:-}
      - LITELLM_API_KEY=${LITELLM_API_KEY:-}
    # Note: actual bind mounts are injected by the CoStaff CLI in compose-fragment.yaml
    depends_on:
      - costaff-mcp-database

  costaff-mcp-database:
    build:
      context: ./mcp
    container_name: costaff-mcp-database
    restart: on-failure
    environment:
      - MCP_DATABASE_PORT=8082
      - WORKSPACE_DIR=/app/data
      - SHARED_DIR=/app/data/shared
      - COSTAFF_SHARED_DIR_DATABASE=/app/data/shared/costaff-agent-database
      - AGENT_WORKSPACE_DIR_DATABASE=/app/data
      - DATABASE_CONFIG=${DATABASE_CONFIG}
    # Note: actual bind mounts are injected by the CoStaff CLI in compose-fragment.yaml
