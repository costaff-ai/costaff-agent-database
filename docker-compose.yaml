services:
  agent-database:
    build:
      context: ./agent
    container_name: costaff-agent-database
    restart: on-failure
    environment:
      - PORT=8081
      - PUBLIC_HOST=database-agent
      - MCP_TEMPLATE_URL=http://mcp-database:8082/mcp
      - DATABASE_WORKSPACE_DIR=/app/data/workspace
      - COSTAFF_AGENT_MODEL_PROVIDER=${COSTAFF_AGENT_MODEL_PROVIDER:-gemini}
      - DATABASE_AGENT_MODEL=${DATABASE_AGENT_MODEL:-gemini-2.5-flash}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - LITELLM_MODEL_NAME=${LITELLM_MODEL_NAME:-}
      - LITELLM_API_BASE=${LITELLM_API_BASE:-}
      - LITELLM_API_KEY=${LITELLM_API_KEY:-}
    volumes:
      - database_data:/app/data
    depends_on:
      - mcp-database

  mcp-database:
    build:
      context: ./mcp
    container_name: costaff-mcp-database
    restart: on-failure
    environment:
      - MCP_DATABASE_PORT=8082
      - DATABASE_WORKSPACE_DIR=/app/data/workspace
      - DATABASE_CONFIG=${DATABASE_CONFIG}
    volumes:
      - database_data:/app/data

volumes:
  database_data:
